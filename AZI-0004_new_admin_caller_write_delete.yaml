id: AZI-0004
name: New admin caller performing write or delete actions
description: |
  Detects a caller performing administrative write or delete actions in the last day that has not been
  observed performing similar actions in the prior baseline period.

status: testing
kind: Scheduled

metadata:
  owner: detection-engineering
  domain: identity
  platform: sentinel
  severity: Medium
  tactic: TA0004
  technique: T1078
  data_sources:
    - AzureActivity
  false_positives:
    - new administrators
    - onboarding of automation identities
  known_benign:
    - approved role transition periods

requiredDataConnectors:
  - connectorId: AzureActivity
    dataTypes:
      - AzureActivity

queryFrequency: 1h
queryPeriod: 24h
triggerOperator: gt
triggerThreshold: 0
suppressionDuration: 2h
suppressionEnabled: false

query: |
  let baseline_start = 14d;
  let baseline_end = 1d;
  let historical_admins =
    AzureActivity
    | where TimeGenerated between (ago(baseline_start) .. ago(baseline_end))
    | where CategoryValue == "Administrative"
    | where OperationNameValue has_any ("write", "delete")
    | summarize by Caller;
  AzureActivity
  | where TimeGenerated >= ago(1d)
  | where CategoryValue == "Administrative"
  | where OperationNameValue has_any ("write", "delete")
  | where Caller !in (historical_admins)
  | project TimeGenerated, Caller, CallerIpAddress, OperationNameValue, ResourceId, SubscriptionId

entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: Caller
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: CallerIpAddress

customDetails:
  RuleId: "AZI-0004"
  Owner: "detection-engineering"

incidentConfiguration:
  createIncident: true

eventGroupingSettings:
  aggregationKind: AlertPerResult

alertDetailsOverride:
  alertDisplayNameFormat: "AZI-0004 New admin caller performing write or delete actions"
  alertDescriptionFormat: "A new administrative caller {{Caller}} performed {{OperationNameValue}}."

version: 1.0.0
