id: AZC-0001
name: Diagnostic settings tamper
description: |
  Detects writes or deletes to diagnostic settings that may reduce visibility into Azure activity or resource logs.

status: testing
kind: Scheduled

metadata:
  owner: detection-engineering
  domain: control-plane
  platform: sentinel
  severity: High
  tactic: TA0005
  technique: T1562.008
  data_sources:
    - AzureActivity
  false_positives:
    - logging pipeline migrations
    - expected connector maintenance
  known_benign:
    - approved observability engineering changes

requiredDataConnectors:
  - connectorId: AzureActivity
    dataTypes:
      - AzureActivity

queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
suppressionDuration: 1h
suppressionEnabled: false

query: |
  let timeframe = 1h;
  let approved_callers = datatable(Caller:string)
  [
    "observability-admin@contoso.com"
  ];
  AzureActivity
  | where TimeGenerated >= ago(timeframe)
  | where CategoryValue == "Administrative"
  | where OperationNameValue has_any (
      "microsoft.insights/diagnosticSettings/write",
      "microsoft.insights/diagnosticSettings/delete"
    )
  | where Caller !in (approved_callers)
  | project TimeGenerated, Caller, CallerIpAddress, OperationNameValue, ActivityStatusValue, ResourceId, SubscriptionId

entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: Caller
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: CallerIpAddress

customDetails:
  RuleId: "AZC-0001"
  Owner: "detection-engineering"

incidentConfiguration:
  createIncident: true

eventGroupingSettings:
  aggregationKind: AlertPerResult

alertDetailsOverride:
  alertDisplayNameFormat: "AZC-0001 Diagnostic settings tamper"
  alertDescriptionFormat: "A diagnostic settings change was performed by {{Caller}} against {{ResourceId}}."

version: 1.0.0
