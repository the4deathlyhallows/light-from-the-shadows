id: AZI-0003
name: App or service principal credential added
description: |
  Detects credentials being added to an application or service principal. This may indicate persistence or
  unauthorized expansion of access through Entra identities.

status: testing
kind: Scheduled

metadata:
  owner: detection-engineering
  domain: identity
  platform: sentinel
  severity: High
  tactic: TA0003
  technique: T1098.001
  data_sources:
    - AuditLogs
  false_positives:
    - approved app onboarding
    - application lifecycle maintenance
  known_benign:
    - CI/CD service principal rotation

requiredDataConnectors:
  - connectorId: AzureActiveDirectory
    dataTypes:
      - AuditLogs

queryFrequency: 1h
queryPeriod: 4h
triggerOperator: gt
triggerThreshold: 0
suppressionDuration: 1h
suppressionEnabled: false

query: |
  let timeframe = 4h;
  AuditLogs
  | where TimeGenerated >= ago(timeframe)
  | where OperationName has_any (
      "Add service principal credentials",
      "Add password credential",
      "Add key credential"
    )
  | extend InitiatingActor = tostring(parse_json(tostring(InitiatedBy.user)).userPrincipalName)
  | extend InitiatingApp = tostring(parse_json(tostring(InitiatedBy.app)).displayName)
  | project TimeGenerated, OperationName, Result, InitiatingActor, InitiatingApp, TargetResources

entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: InitiatingActor

customDetails:
  RuleId: "AZI-0003"
  Owner: "detection-engineering"

incidentConfiguration:
  createIncident: true

eventGroupingSettings:
  aggregationKind: AlertPerResult

alertDetailsOverride:
  alertDisplayNameFormat: "AZI-0003 App or service principal credential added"
  alertDescriptionFormat: "Credential addition activity observed in AuditLogs. Actor: {{InitiatingActor}} App: {{InitiatingApp}}."

version: 1.0.0
